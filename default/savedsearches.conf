[DE - Update Registry Last Seen]
description = Updates last_seen timestamps and event counts in data source registry
search = `de_monitored_index` `de_active_hosts` earliest=0 latest=now \
| stats max(_time) as last_seen count as last_seen_count by host sourcetype source index \
| `de_compute_channel` \
| eval _key=host."::".channel \
| lookup data_source_registry_lookup _key OUTPUT category \
| outputlookup append=true key_field=_key data_source_registry_lookup
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 0
cron_schedule = */15 * * * *
is_scheduled = 0
alert.track = 0
action.summary_index = 0

[DE - Bootstrap Registry from Index]
description = One-time seed: discovers all host/channel pairs for active hosts and adds missing ones to data_source_registry
search = `de_monitored_index` `de_active_hosts` earliest=0 latest=now \
| stats max(_time) as last_seen count as last_seen_count by host sourcetype source index \
| `de_compute_channel` \
| eval _key=host."::".channel \
| lookup data_source_registry_lookup _key OUTPUT category as existing_category \
| where isnull(existing_category) OR existing_category="" \
| fields _key host channel sourcetype source index last_seen last_seen_count \
| outputlookup append=true key_field=_key data_source_registry_lookup
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 0
is_scheduled = 0
alert.track = 0
dispatch.max_count = 10000

[DE - Alert: Sources Gone Silent]
description = Detects data sources that have stopped logging; writes open/close events to de_alerts. Enable after de_host_registry is populated.
search = | `de_get_registry` \
| lookup de_host_registry_lookup host OUTPUT status, host_role, criticality, system_boundary \
| where status="active" OR status="silent" \
| eval data_source_key=_key \
| eval _key=index."::".host."::".channel \
| lookup de_role_templates_lookup host_role channel OUTPUT expected_frequency as template_frequency \
| eval threshold=coalesce(template_frequency, `de_default_silence_threshold`) \
| eval time_since_seen=if(isnotnull(last_seen) AND last_seen>0, now()-last_seen, null()) \
| eval is_silent=if(isnull(time_since_seen) OR time_since_seen > threshold, 1, 0) \
| lookup de_alert_state_lookup _key OUTPUT state as prev_state, alert_id as prev_alert_id, opened_at as prev_opened_at \
| eval prev_state=coalesce(prev_state, "normal") \
| eval alert_event_type=case( \
    is_silent=1 AND prev_state="normal",    "open", \
    is_silent=0 AND prev_state="anomalous", "close", \
    true(),                                  "nochange") \
| where alert_event_type!="nochange" \
| eval opened_at=if(alert_event_type="open", now(), prev_opened_at) \
| eval alert_id=if(alert_event_type="open", \
    "de-".tostring(round(now()))."::".index."::".host."::".channel, \
    prev_alert_id) \
| eval state=if(alert_event_type="open", "anomalous", "normal") \
| eval severity=case(criticality="high","high", criticality="medium","medium", true(),"low") \
| eval alert_name="DE - Sources Gone Silent" \
| eval alert_type="source_silent" \
| eval message=case( \
    alert_event_type="open", \
        "Source ".channel." on ".host." has gone silent (".round(time_since_seen/3600,1)."h since last event; threshold ".round(threshold/3600,1)."h)", \
    alert_event_type="close", \
        "Source ".channel." on ".host." has recovered and is now logging") \
| eval affected_host=host \
| eval affected_sourcetype=channel \
| eval last_checked=now() \
| collect index=de_alerts sourcetype="data_explorer:alert" \
| fields _key, index, host, sourcetype, state, alert_id, alert_name, opened_at, last_checked \
| outputlookup append=true key_field=_key de_alert_state_lookup
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 0
cron_schedule = */15 * * * *
is_scheduled = 0
alert.track = 0

[DE - Alert: Absent Sources Detected]
description = Detects host::channel pairs expected by role template but never seen; fires once, clears when source begins logging
search = | `de_get_host_registry` \
| where status="active" \
| join type=inner host_role [ \
    search | `de_get_role_templates` ] \
| eval _key=host."::".channel \
| eval alert_state_key="absent::"._key \
| lookup data_source_registry_lookup _key OUTPUT last_seen \
| lookup de_alert_state_lookup _key AS alert_state_key OUTPUT state as prev_state, alert_id as prev_alert_id, opened_at as prev_opened_at \
| eval prev_state=coalesce(prev_state, "normal") \
| eval is_absent=if(isnull(last_seen) OR last_seen="", 1, 0) \
| eval alert_event_type=case( \
    is_absent=1 AND prev_state="normal",    "open", \
    is_absent=0 AND prev_state="anomalous", "close", \
    true(),                                  "nochange") \
| where alert_event_type!="nochange" \
| eval opened_at=if(alert_event_type="open", now(), prev_opened_at) \
| eval alert_id=if(alert_event_type="open", \
    "de-".tostring(round(now()))."::"._key, \
    prev_alert_id) \
| eval state=if(alert_event_type="open", "anomalous", "normal") \
| eval severity=case( \
    alert_event_type="close",   "info", \
    criticality="high",         "high", \
    criticality="medium",       "medium", \
    true(),                     "low") \
| eval alert_name="DE - Alert: Absent Sources Detected" \
| eval alert_type="source_absent" \
| eval message=case( \
    alert_event_type="open", \
        "Channel ".channel." is expected on ".host." (role=".host_role.") but has never been seen in the index", \
    alert_event_type="close", \
        "Channel ".channel." on ".host." has begun logging and is no longer absent") \
| eval data_source_key=_key \
| eval affected_host=host \
| eval affected_sourcetype=channel \
| eval index=coalesce(index, "unknown") \
| eval last_checked=now() \
| collect index=de_alerts sourcetype="data_explorer:alert" \
| eval _key=alert_state_key \
| eval sourcetype=channel \
| fields _key, index, host, sourcetype, state, alert_id, alert_name, opened_at, last_checked \
| outputlookup append=true key_field=_key de_alert_state_lookup
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 0
cron_schedule = */15 * * * *
is_scheduled = 0
alert.track = 0

# de_summary event fields:
#   _time, s_host, s_sourcetype, s_source, s_channel, s_index, events, bytes, dow, hod
#
# s_channel is the join key for baseline slot grouping.
# License bytes join uses index::host::sourcetype (internal data granularity).
# For Windows multi-channel sourcetypes (XmlWinEventLog), bytes are approximate
# — all channels sharing a sourcetype receive the same summed value.
# Baseline comparison uses events only; bytes are for reference.

[DE - Write Hourly Stats]
description = Writes per-host::channel event count and license bytes to de_summary index for the completed hour
search = | tstats count as events WHERE `de_monitored_index` `de_active_hosts` earliest=-1h@h latest=@h \
    BY host, sourcetype, source, index \
| `de_compute_channel` \
| eval license_key=index."::".host."::".sourcetype \
| join type=left license_key [ \
    search index=_internal sourcetype=splunkd_license_usage earliest=-1h@h latest=@h \
    | eval license_key=idx."::".h."::".st \
    | stats sum(b) as bytes BY license_key ] \
| eval bytes=coalesce(bytes, 0) \
| eval s_host=host, s_sourcetype=sourcetype, s_source=source, s_channel=channel, s_index=index \
| eval dow=strftime(relative_time(now(),"-1h@h"), "%w"), \
       hod=tonumber(strftime(relative_time(now(),"-1h@h"), "%H")), \
       hour_start=relative_time(now(),"-1h@h") \
| fields s_host, s_sourcetype, s_source, s_channel, s_index, events, bytes, dow, hod, hour_start \
| eval _time=relative_time(now(),"-1h@h") \
| collect index=de_summary sourcetype="de:hourly_stat" source="de_write_hourly_stats"
dispatch.earliest_time = -1h@h
dispatch.latest_time = @h
cron_schedule = 1 * * * *
enableSched = 1
is_scheduled = 1
alert.track = 0
dispatch.max_count = 100000

# One-time backfill: scans the monitored index and _internal,
# aggregates by 1h bucket, writes all rows to de_summary.
# dispatch.max_time=0 disables the search timeout — required for large time ranges.
# Run once after creating de_summary index, before enabling DE - Baseline Comparison.
# _time is correct: tstats BY _time span=1h produces per-hour bucket timestamps;
# collect (addtime=true default) preserves them faithfully.
[DE - Backfill Hourly Stats]
description = One-time backfill: populates de_summary with hourly stats for active hosts. Run before enabling DE - Baseline Comparison.
search = | tstats count as events WHERE `de_monitored_index` `de_active_hosts` earliest=-30d@h latest=@h \
    BY host, sourcetype, source, index, _time span=1h \
| `de_compute_channel` \
| eval license_key=index."::".host."::".sourcetype \
| join type=left license_key [ \
    search index=_internal sourcetype=splunkd_license_usage earliest=-30d@h latest=@h \
    | eval license_key=idx."::".h."::".st \
    | stats sum(b) as bytes BY license_key ] \
| eval bytes=coalesce(bytes, 0) \
| eval s_host=host, s_sourcetype=sourcetype, s_source=source, s_channel=channel, s_index=index \
| eval dow=strftime(_time, "%w"), hod=tonumber(strftime(_time, "%H")), hour_start=_time \
| fields s_host, s_sourcetype, s_source, s_channel, s_index, events, bytes, dow, hod, hour_start \
| collect index=de_summary sourcetype="de:hourly_stat" source="de_backfill_hourly_stats"
dispatch.earliest_time = -30d@h
dispatch.latest_time = @h
dispatch.max_time = 0
enableSched = 0
is_scheduled = 0
alert.track = 0
dispatch.max_count = 1000000
