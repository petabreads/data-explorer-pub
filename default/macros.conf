# Swap this to point at the target index on new deployments
[de_monitored_index]
definition = index=botsv3
iseval = 0

[de_alert_index]
definition = index=de_alerts
iseval = 0

[de_get_registry]
definition = inputlookup data_source_registry_lookup
iseval = 0

[de_get_host_registry]
definition = inputlookup de_host_registry_lookup
iseval = 0

[de_get_role_templates]
definition = inputlookup de_role_templates_lookup
iseval = 0

# Subsearch filter for tstats WHERE — expands to active hosts only
[de_active_hosts]
definition = [| inputlookup de_host_registry_lookup | where status="active" | dedup host | fields host | format]
iseval = 0

# Windows (WinEventLog/XmlWinEventLog): channel = source (e.g. xmlwineventlog:security)
# All other platforms: channel = sourcetype (e.g. syslog, cisco:asa)
[de_compute_channel]
definition = eval channel=case(match(sourcetype,"(?i)^(wineventlog|xmlwineventlog)$"),source,true(),sourcetype)
iseval = 0

[de_default_silence_threshold]
definition = 3600
iseval = 0
