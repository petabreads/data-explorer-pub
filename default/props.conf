# de:hourly_stat — written by DE - Write Hourly Stats and DE - Backfill Hourly Stats
# MAX_DAYS_AGO: default is 2000 (~5.5 years). Set high to support backfilling
# from historical datasets older than 5.5 years (e.g. BOTSv3 from 2018).
# Without this, Splunk stamps _time=now() for events beyond the default limit.
[de:hourly_stat]
MAX_DAYS_AGO = 10000
