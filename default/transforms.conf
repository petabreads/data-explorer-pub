[data_source_registry_lookup]
collection = data_source_registry
type = kvstore
external_type = kvstore
fields_list = _key, host, channel, sourcetype, source, index, category, last_seen, last_seen_count

[de_host_registry_lookup]
collection = de_host_registry
type = kvstore
external_type = kvstore
fields_list = _key, host, host_role, status, system_boundary, owner, criticality, notes

[de_role_templates_lookup]
filename = de_role_templates.csv
case_sensitive_match = false

[de_alert_state_lookup]
collection = de_alert_state
type = kvstore
external_type = kvstore
fields_list = _key, state, alert_id, alert_name, opened_at, last_checked, index, host, sourcetype
