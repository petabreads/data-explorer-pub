# de_alerts: alert event log consumed by Splunk ES. Append-only; open/close state
# is tracked separately in de_alert_state KV Store.
[de_alerts]
homePath   = $SPLUNK_DB/de_alerts/db
coldPath   = $SPLUNK_DB/de_alerts/colddb
thawedPath = $SPLUNK_DB/de_alerts/thaweddb

# de_summary: hourly per-host::sourcetype stats written by DE - Write Hourly Stats
# and DE - Backfill Hourly Stats. One event per host::sourcetype per hour.
# frozenTimePeriodInSecs = 315576000 = 10 years — supports backfilling historical datasets.
[de_summary]
homePath   = $SPLUNK_DB/de_summary/db
coldPath   = $SPLUNK_DB/de_summary/colddb
thawedPath = $SPLUNK_DB/de_summary/thaweddb
maxHotBuckets = 4
frozenTimePeriodInSecs = 315576000
